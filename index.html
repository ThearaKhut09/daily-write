<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Daily Write - Share Your Stories</title>
    <meta name="title" content="Daily Write - Share Your Stories" />
    <meta name="description" content="Daily Write is a platform where you can share your thoughts, stories, and experiences with a global community." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://daily-write.vercel.app/" />
    <meta property="og:title" content="Daily Write - Share Your Stories" />
    <meta property="og:description" content="Daily Write is a platform where you can share your thoughts, stories, and experiences with a global community." />
    <meta property="og:image" content="/logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://daily-write.vercel.app/" />
    <meta property="twitter:title" content="Daily Write - Share Your Stories" />
    <meta property="twitter:description" content="Daily Write is a platform where you can share your thoughts, stories, and experiences with a global community." />
    <meta property="twitter:image" content="/logo.svg" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
